# ====================================================================
# QoS动态带宽分配器 (qosdba) 配置文件
# 统一配置文件格式，包含设备参数和分类参数
# 文件格式说明：
# 1. 设备节：[device=设备名] 或 [download]/[upload]
# 2. 设备参数以键值对形式设置
# 3. 分类参数格式：classid,name,priority,total_bw_kbps,min_bw_kbps,max_bw_kbps,dba_enabled
# ====================================================================

# ==================== 下载设备 (ifb0) 配置 ====================
[device=ifb0]
# 基本参数
enabled=1
total_bandwidth_kbps=100000
interval=2
min_change_kbps=128

# 使用率阈值参数
high_util_threshold=90
high_util_duration=5
low_util_threshold=50
low_util_duration=5

# 借用参数
borrow_ratio=0.2
min_borrow_kbps=128
cooldown_time=8

# 归还参数
auto_return_enable=1
return_threshold=60
return_speed=0.1

# 运行模式
safe_mode=0
debug_mode=0

# 下载分类定义
# 格式: classid,name,priority,total_bw_kbps,min_bw_kbps,max_bw_kbps,dba_enabled
0x201,realtime,1,10000,8000,20000,0
0x202,normal,2,70000,42000,105000,1
0x203,bulk,3,20000,4000,20000,1

# ==================== 上传设备 (pppoe-wan) 配置 ====================
[device=pppoe-wan]
# 基本参数
enabled=1
total_bandwidth_kbps=50000
interval=1
min_change_kbps=64

# 使用率阈值参数
high_util_threshold=85
high_util_duration=3
low_util_threshold=40
low_util_duration=3

# 借用参数
borrow_ratio=0.3
min_borrow_kbps=64
cooldown_time=8

# 归还参数
auto_return_enable=1
return_threshold=50
return_speed=0.15

# 运行模式
safe_mode=0
debug_mode=0

# 上传分类定义
# 格式: classid,name,priority,total_bw_kbps,min_bw_kbps,max_bw_kbps,dba_enabled
0x101,realtime,1,7500,4500,15000,0
0x102,normal,2,35000,17500,52500,1
0x103,bulk,3,7500,750,7500,1