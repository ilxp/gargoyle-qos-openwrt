# ====================================================================
# QoS动态带宽分配器 (qosdba) 配置文件 - 优化版本
# 统一配置文件格式，包含设备参数和分类参数
# 文件格式说明：
# 1. 设备节：[device=设备名] 或 [download]/[upload]
# 2. 设备参数以键值对形式设置
# 3. 分类参数格式：classid,name,priority,total_bw_kbps,min_bw_kbps,max_bw_kbps,dba_enabled
# ====================================================================

# ==================== 全局配置 ====================
[global]
# 运行模式
debug_mode=0
safe_mode=0
interval=2

# 日志配置
log_level=INFO
log_file=/var/log/qosdba.log
max_log_size=10485760
log_rotate=5

# ==================== 下载设备 (ifb0) 配置 ====================
[device=ifb0]
# 基本参数
enabled=1
total_bandwidth_kbps=100000
algorithm=htb
interval=2
min_change_kbps=128

# 使用率阈值参数
borrow_trigger_threshold=90        # 借用触发阈值(70-100)
lend_trigger_threshold=30          # 借出触发阈值(10-50)
continuous_seconds=5               # 连续时间窗口(3-10秒)
return_threshold=50                # 归还触发阈值(20-70)

# 借用参数
borrow_ratio=0.2                   # 借用计算比例
max_borrow_ratio=0.3               # 单次最大借用比例(10-50%)
min_borrow_kbps=128
cooldown_time=8
min_priority_gap=2                 # 最小优先级间隔(1-5)

# 归还参数
auto_return_enable=1
return_speed=0.1                   # 渐进归还速度(5-20%)

# 保护机制参数
min_guaranteed_ratio=1.0           # 最小保证带宽比例(1.0-2.0)
keep_for_self_ratio=1.2            # 为自己保留比例(1.1-2.0)
max_lend_ratio=0.5                 # 最大借出比例(20-80%)

# 多源借用参数
enable_multi_source_borrow=1       # 启用多源借用(0/1)
max_borrow_sources=3               # 最多借用源数量(1-5)
load_balance_mode=1                # 负载均衡模式(0:集中,1:分散)

# 紧急保护参数
starvation_warning=80              # 饿死警戒线(50-90%)
starvation_critical=90             # 饿死紧急线(70-95%)
emergency_return_ratio=0.5         # 紧急归还比例(10-100%)
high_priority_protect_level=95     # 高优先级保护线(80-100%)

# 缓存与性能参数
cache_interval=1000                # 缓存查询间隔(ms)
adaptive_cache=1                   # 自适应缓存(0/1)
adaptive_batch=1                   # 自适应批量(0/1)

# 下载分类定义
# 格式: classid,name,priority,total_bw_kbps,min_bw_kbps,max_bw_kbps,dba_enabled
0x201,realtime,1,10000,8000,20000,0
0x202,normal,2,70000,42000,105000,1
0x203,bulk,3,20000,4000,20000,1

# ==================== 上传设备 (pppoe-wan) 配置 ====================
[device=pppoe-wan]
# 基本参数
enabled=1
total_bandwidth_kbps=50000
algorithm=htb
interval=1
min_change_kbps=64

# 使用率阈值参数
borrow_trigger_threshold=85        # 借用触发阈值(70-100)
lend_trigger_threshold=25          # 借出触发阈值(10-50)
continuous_seconds=3               # 连续时间窗口(3-10秒)
return_threshold=40                # 归还触发阈值(20-70)

# 借用参数
borrow_ratio=0.3                   # 借用计算比例
max_borrow_ratio=0.3               # 单次最大借用比例(10-50%)
min_borrow_kbps=64
cooldown_time=8
min_priority_gap=1                 # 最小优先级间隔(1-5)

# 归还参数
auto_return_enable=1
return_speed=0.15                  # 渐进归还速度(5-20%)

# 保护机制参数
min_guaranteed_ratio=1.0           # 最小保证带宽比例(1.0-2.0)
keep_for_self_ratio=1.3            # 为自己保留比例(1.1-2.0)
max_lend_ratio=0.5                 # 最大借出比例(20-80%)

# 多源借用参数
enable_multi_source_borrow=1       # 启用多源借用(0/1)
max_borrow_sources=2               # 最多借用源数量(1-5)
load_balance_mode=1                # 负载均衡模式(0:集中,1:分散)

# 紧急保护参数
starvation_warning=75              # 饿死警戒线(50-90%)
starvation_critical=85             # 饿死紧急线(70-95%)
emergency_return_ratio=0.6         # 紧急归还比例(10-100%)
high_priority_protect_level=90     # 高优先级保护线(80-100%)

# 缓存与性能参数
cache_interval=500                 # 缓存查询间隔(ms)
adaptive_cache=1                   # 自适应缓存(0/1)
adaptive_batch=1                   # 自适应批量(0/1)

# 上传分类定义
# 格式: classid,name,priority,total_bw_kbps,min_bw_kbps,max_bw_kbps,dba_enabled
0x101,realtime,1,7500,4500,15000,0
0x102,normal,2,35000,17500,52500,1
0x103,bulk,3,7500,750,7500,1