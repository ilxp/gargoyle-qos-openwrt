# qosacc.conf - QoS监控器配置文件
# 自动生成于: 2024-01-15
# 生成脚本: qos_gargoyle

# 基本配置
[basic]
ping_interval = 200
target = 8.8.8.8
max_bandwidth_kbps = 10000
ping_limit_ms = 20
device = ifb0
classid = 0x101

# 控制参数
[control]
safe_mode = 0
verbose = 0
auto_switch_mode = 0
background_mode = 1
skip_initial = 0

# 算法参数
[algorithm]
min_bw_change_kbps = 10
min_bw_ratio = 0.1
max_bw_ratio = 1.0
smoothing_factor = 0.3
active_threshold = 0.7
idle_threshold = 0.3
safe_start_ratio = 0.5

# 文件路径
[paths]
debug_log = /var/log/qosacc.log
status_file = /tmp/qosacc.status
config_file = /etc/qosacc.conf

# 高级选项
[advanced]
# ping历史记录大小
ping_history_size = 10
# 最小ping时间(ms)
min_ping_time_ms = 1
# 最大ping时间(ms)
max_ping_time_ms = 5000
# 统计间隔(ms)
stats_interval_ms = 1000
# 控制间隔(ms)
control_interval_ms = 1000
# 实时检测间隔(ms)
realtime_detect_ms = 1000
# 心跳间隔(ms)
heartbeat_interval_ms = 10000