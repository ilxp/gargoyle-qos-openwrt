# 智能动态分类 (idclass) 配置
config idclass 'idclass'
	option enabled '1'

	# ---------- 接口定义 ----------
	option wan_interface 'pppoe-wan'
	option ifb_device 'ifb0'

	# ---------- 游戏类阈值 ----------
	option game_max_avg_pktlen '200'
	option game_min_conn '1'
	option game_max_conn '10'
	option game_max_pps '20'
	option game_sample_packets '10'

	# ---------- 视频类阈值 ----------
	option video_min_avg_pktlen '800'
	option video_max_avg_pktlen '1500'
	option video_min_conn '1'
	option video_max_conn '30'
	option video_min_pps '50'
	option video_max_pps '200'

	# ---------- 大流量类阈值 ----------
	option bulk_min_avg_pktlen '1000'
	option bulk_min_conn '20'
	option bulk_min_pps '100'

	# ---------- TCP标志阈值 ----------
	option tcp_flags_syn_ack_ratio '2'
	option tcp_flags_window '10'

	# ---------- 连接持续时间 ----------
	option conn_duration_short '5'
	option conn_duration_long '30'

	# ---------- 上下行流量比 ----------
	option up_down_ratio_low '0.3'
	option up_down_ratio_high '3.0'

	# ---------- 突发检测 ----------
	option burst_window_ms '100'
	option burst_packets '10'
	option burst_bytes '10240'

	# ---------- IAT 阈值 ----------
	option iat_threshold_us '10000'

	# ---------- 重传阈值 ----------
	option retrans_threshold '5'

	# ---------- 特征开关 ----------
	option enable_pktlen '1'
	option enable_conn_count '1'
	option enable_pps '0'
	option enable_iat '0'
	option enable_retrans '0'
	option enable_tcp_flags '0'
	option enable_conn_duration '0'
	option enable_up_down_ratio '0'
	option enable_burst '0'

	# ---------- 权重配置 ----------
	option weight_pktlen_realtime '3'
	option weight_pktlen_video    '3'
	option weight_pktlen_normal   '1'
	option weight_pktlen_bulk     '3'
	option weight_conn_realtime   '2'
	option weight_conn_video      '1'
	option weight_conn_normal     '1'
	option weight_conn_bulk       '2'
	option weight_pps_realtime    '2'
	option weight_pps_video       '2'
	option weight_pps_normal      '1'
	option weight_pps_bulk        '2'
	option weight_burst_bulk      '3'
	option weight_tcpflags_bulk   '2'
	option weight_retrans_bulk    '2'
	option weight_duration_realtime '1'
	option weight_duration_video   '1'
	option weight_duration_bulk    '2'
	option weight_ratio_video      '1'
	option weight_ratio_realtime   '1'
	option weight_ratio_bulk       '1'
	option weight_iat_realtime     '2'

	# ---------- 最低得分阈值 ----------
	option score_threshold '3'

	# ---------- 逻辑优先级期望值 ----------
	option prio_realtime '0'
	option prio_video    '1'
	option prio_normal   '2'
	option prio_bulk     '3'