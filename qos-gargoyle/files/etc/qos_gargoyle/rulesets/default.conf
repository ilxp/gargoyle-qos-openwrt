# ========== 上传规则（优化） ==========
# 1. 小包（<100字节）且为 TCP ACK 的实时流量（游戏/语音心跳包）
config upload_rule 'upload_ack_small'
    option enabled '1'
    option class 'uclass_1'
    option order '0'                # 最高优先级
    option family 'inet'
    option proto 'tcp'
    option packet_len '<100'
    option tcp_flags 'ack'
    option description 'TCP ACK小包优先'

# 2. 极小包（<64字节）UDP 实时流量（游戏心跳）
config upload_rule 'upload_udp_small'
    option enabled '1'
    option class 'uclass_1'
    option order '1'
    option family 'inet'
    option proto 'udp'
    option packet_len '<64'
    option description 'UDP小包优先'

# 3. DNS 查询（保留原规则，但增加小包条件）
config upload_rule 'upload_rule_1'
    option enabled '1'
    option class 'uclass_1'
    option order '2'
    option family 'inet'
    option dstport '53,5353'
    option packet_len '<256'         # DNS 通常小包
    option connbytes_kb '<=10'
    option proto 'udp'

# 4. 游戏/语音端口（原规则，增加包长度限制）
config upload_rule 'upload_rule_2'
    option enabled '1'
    option class 'uclass_1'
    option order '3'
    option family 'inet'
    option proto 'udp'
    option dstport '3074,3478-3480,27015-27030,27960-27970,3659,6000-7000'
    option packet_len '<1500'        # 游戏包通常不大

# 5. VoIP/SIP（原规则，增加包长度限制）
config upload_rule 'upload_rule_3'
    option enabled '1'
    option class 'uclass_1'
    option order '4'
    option family 'inet'
    option proto 'udp'
    option dstport '5060-5061,10000-20000'
    option packet_len '<500'

# 6. 视频流 TCP 小包（避免被误判为正常）
config upload_rule 'upload_video_small'
    option enabled '1'
    option class 'uclass_2'
    option order '5'
