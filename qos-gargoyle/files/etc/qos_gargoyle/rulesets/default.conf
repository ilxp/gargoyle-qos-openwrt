# 上传类别定义 - 三大类 (总上传带宽: 50Mbps = 50000kbps)
config upload_class 'uclass_1'  # realtime (游戏/语音/实时视频) - 最高优先级
	option name 'realtime'
	option enabled '1'
	option priority '1'
	option mark_index '1'
	option percent_bandwidth '15'  # 占总上传带宽的15% = 7.5Mbps
	option per_min_bandwidth '60'      # 保证带宽占类别带宽的60% = 4.5Mbps
	option per_max_bandwidth '200'      # #允许借用
	option minRTT 'No'  # 最小往返延时
	option description 'Game/VoIP'

config upload_class 'uclass_2'  # normal (普通流量: 视频/网页/应用) - 主类别
	option name 'normal'
	option enabled '1'
	option priority '2'
	option mark_index '2'
	option percent_bandwidth '70'  # 占总上传带宽的70% = 35Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '200'     # 最大带宽占类别带宽的200% = 70Mbps
	option minRTT 'No'
	option description 'Video/Web/Application'

config upload_class 'uclass_3'  # bulk (大文件/后台流量) - 低优先级
	option name 'bulk'
	option enabled '1'
	option priority '3'
	option mark_index '3'
	option percent_bandwidth '15'  # 占总上传带宽的15% = 7.5Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '100'     # 最大带宽占类别带宽的100% = 7.5Mbps
	option minRTT 'No'
	option description 'File/P2P'

# 下载类别定义 - 三大类 (总下载带宽: 100Mbps = 100000kbps)
config download_class 'dclass_1'  # realtime (游戏/语音/实时视频) - 最高优先级
	option name 'realtime'
	option enabled '1'
	option priority '1'
	option mark_index '1'
	option percent_bandwidth '10'  # 占总下载带宽的10% = 10Mbps
	option per_min_bandwidth '60'  # 保证带宽占类别带宽的60% = 6Mbps
	option per_max_bandwidth '200'   #允许借用
	option minRTT 'Yes'  # 最小往返延时
	option description 'Game/VoIP'

config download_class 'dclass_2'  # normal (普通流量: 视频/网页/应用) - 主类别
	option name 'normal'
	option enabled '1'
	option priority '2'
	option mark_index '2'
	option percent_bandwidth '70'  # 占总下载带宽的70% = 70Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '200'     # 最大带宽占类别带宽的200% = 140Mbps
	option minRTT 'No'
	option description 'Video/Web/Application'

config download_class 'dclass_3'  # bulk (大文件/后台流量) - 低优先级
	option name 'bulk'
	option enabled '1'
	option priority '3'
	option mark_index '3'
	option percent_bandwidth '20'  # 占总下载带宽的20% = 20Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '100'     # 最大带宽占类别带宽的100% = 20Mbps
	option minRTT 'No'
	option description 'File/P2P'
	
# ========== 实时类 (realtime) ==========
# 规则1: DNS (小查询)
config upload_rule 'upload_realtime_dns'
	option enabled '1'
	option class 'uclass_1'
	option order '1'
	option family 'inet'
	option proto 'udp'
	option dstport '53,5353'
	option connbytes_kb '<=10'

# 规则2: 游戏/语音 (UDP)
config upload_rule 'upload_realtime_game_voice'
	option enabled '1'
	option class 'uclass_1'
	option order '2'
	option family 'inet'
	option proto 'udp'
	option dstport '3074,3478-3480,3659,6000-7000,10000-12000,12200-13500,16100-18200,19200-20500,27000-28000,27015-27030,27960-27970'

# 规则3: VoIP/SIP
config upload_rule 'upload_realtime_voip'
	option enabled '1'
	option class 'uclass_1'
	option order '3'
	option family 'inet'
	option proto 'udp'
	option dstport '5060-5061,10000-20000'   # 注意此范围与游戏部分重叠，但order更高优先匹配

# 规则4: 实时通信排除（已并入游戏规则，不再单独列出）

# ========== 正常类 (normal) ==========
# 规则5: 小流量保护 (TCP)
config upload_rule 'upload_normal_small_tcp'
	option enabled '1'
	option class 'uclass_2'
	option order '4'
	option family 'inet'
	option proto 'tcp'
	option dstport '80,443,8080,8081,1935,1936,554,8554,853'
	option connbytes_kb '<=1024'
	option description '小流量HTTP/HTTPS/流媒体TCP'

# 规则6: 小流量保护 (UDP) – 适用于QUIC/HTTP3等
config upload_rule 'upload_normal_small_udp'
	option enabled '1'
	option class 'uclass_2'
	option order '5'
	option family 'inet'
	option proto 'udp'
	option dstport '80,443,8080,8081,1935,1936,554,8554,853'
	option connbytes_kb '<=1024'
	option description '小流量HTTP/HTTPS/流媒体UDP'

# 规则7: 流媒体/视频 (TCP)
config upload_rule 'upload_normal_video_tcp'
	option enabled '1'
	option class 'uclass_2'
	option order '6'
	option family 'inet'
	option proto 'tcp'
	option dstport '80,443,8080,8081,1935,1936,554,8554'
	option connbytes_kb '>=50'
	option description '流媒体TCP'

# 规则8: 普通网页浏览 (中等大小)
config upload_rule 'upload_normal_web'
	option enabled '1'
	option class 'uclass_2'
	option order '7'
	option family 'inet'
	option proto 'tcp'
	option dstport '80,443,8080,8081'
	option connbytes_kb '10-768'
	option description '普通网页'

# 规则9: 动态端口UDP (默认归为正常)
config upload_rule 'upload_normal_dyn_udp'
	option enabled '1'
	option class 'uclass_2'
	option order '8'
	option family 'inet'
	option proto 'udp'
	option dstport '1024-10000,20000-65535'
	option description '动态端口UDP'

# 规则10: 动态端口TCP小流量
config upload_rule 'upload_normal_dyn_tcp_small'
	option enabled '1'
	option class 'uclass_2'
	option order '9'
	option family 'inet'
	option proto 'tcp'
	option dstport '1024-10000,20000-65535'
	option connbytes_kb '<=256'
	option description '动态端口TCP小流量'

# ========== 批量类 (bulk) ==========
# 规则11: P2P专用端口
config upload_rule 'upload_bulk_p2p_ports'
	option enabled '1'
	option class 'uclass_3'
	option order '10'
	option family 'inet'
	option proto 'tcp_udp'
	option dstport '6881-6999,4662,4672,6346,6347,1214,6699,6882-6900,2710'
	option description 'P2P专用端口'

# 规则12: 大文件上传 (FTP/SSH)
config upload_rule 'upload_bulk_large_ftp_ssh'
	option enabled '1'
	option class 'uclass_3'
	option order '11'
	option family 'inet'
	option proto 'tcp'
	option dstport '20,21,22'
	option connbytes_kb '>=2048'
	option description 'FTP/SSH大流量'

# 规则13: 通用大流量 (TCP/UDP) – 合并所有大流量阈值
config upload_rule 'upload_bulk_generic_large'
	option enabled '1'
	option class 'uclass_3'
	option order '12'
	option family 'inet'
	option proto 'tcp_udp'
	option dstport '1024-65535'
	option connbytes_kb '>=8192'   # 8MB以上
	option description '通用大流量连接'

# 规则14: 高阈值额外覆盖（可选）
config upload_rule 'upload_bulk_extra_large'
	option enabled '1'
	option class 'uclass_3'
	option order '13'
	option family 'inet'
	option proto 'tcp_udp'
	option dstport '1024-65535'
	option connbytes_kb '>=16384'
	option description '超大流量'
	
