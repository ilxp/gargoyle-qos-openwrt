# 上传类别定义 - 四大类 (总上传带宽: 50Mbps = 50000kbps)
config upload_class 'uclass_1'  # realtime (游戏/语音/实时视频) - 最高优先级
	option name 'realtime'
	option enabled '1'
	option priority '1'
	option mark_index '1'
	option percent_bandwidth '15'  # 占总上传带宽的15% = 7.5Mbps
	option per_min_bandwidth '60'      # 保证带宽占类别带宽的60% = 4.5Mbps
	option per_max_bandwidth '200'      # #允许借用
	option minRTT 'No'  # 最小往返延时
	option description 'Game/VoIP'
	
config upload_class 'uclass_2'  # video (视频流)
	option name 'video'
	option enabled '1'
	option priority '2'          # 与 normal 同级或略高
	option mark_index '2'
	option percent_bandwidth '30'   # 占总上传带宽的30% = 15Mbps
	option per_min_bandwidth '0'
	option per_max_bandwidth '200'
	option minRTT 'No'
	option description 'Video streaming'

config upload_class 'uclass_3'  # normal (普通流量: 网页/应用) - 主类别
	option name 'normal'
	option enabled '1'
	option priority '3'
	option mark_index '3'
	option percent_bandwidth '70'  # 占总上传带宽的70% = 35Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '200'     # 最大带宽占类别带宽的200% = 70Mbps
	option minRTT 'No'
	option description 'Web/Application'

config upload_class 'uclass_4'  # bulk (大文件/后台流量) - 低优先级
	option name 'bulk'
	option enabled '1'
	option priority '4'
	option mark_index '4'
	option percent_bandwidth '15'  # 占总上传带宽的15% = 7.5Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '100'     # 最大带宽占类别带宽的100% = 7.5Mbps
	option minRTT 'No'
	option description 'File/P2P'

