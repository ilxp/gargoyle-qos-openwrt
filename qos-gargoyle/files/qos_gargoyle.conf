# 全局配置
config global 'global'
	option enabled '0'
	option wan_interface 'pppoe-wan'
	option algorithm 'hfsc_cake'
	option linklayer 'atm'
	option overhead '32'

# 上传配置
config upload 'upload'
	option total_bandwidth '50000'
	option default_class 'uclass_2'  # normal作为默认类别

# 下载配置
config download 'download'
	option default_class 'dclass_2'  # normal作为默认类别
	option total_bandwidth '100000'
	option ifb_device 'ifb0'

# 算法配置	
config hfsc 'hfsc'
	option latency_mode 'dynamic'
	option minrtt_enabled '1'
	option minrtt_delay '1000us'

config cake 'cake'
	option enable_mq '1'
	option diffserv_mode 'diffserv4'
	option rtt '50ms'
	option flowmode 'srchost'          # 新增：流模式，可选 srchost/dsthost/flows/dual-srchost 等
	option limit '10240'                # 新增：CAKE 队列包数量限制
	option overhead '0'
	option mpu '0'
	option memlimit '64Mb'
	option ack_filter '1'
	option nat '1'
	option wash '0'
	option split_gso '1'
	option ingress '0'       # 0=使用IFB, 1=使用ingress队列
	option autorate_ingress '0'
	
	# cake-autorate（可选，由外部工具使用）
    #option autorate_enabled '1' 	 # 启用自动速率调整
    #option autorate_persist '1'      # 启用配置持久化
    #option autorate_interval '10'         # 调整间隔（秒）
    #option autorate_ping_hosts '223.5.5.5 119.29.29.29 180.76.76.76'  # 延迟测量目标
    #option autorate_min_rtt '10ms'        # 目标最小延迟
    #option autorate_max_rtt '50ms'       # 触发降速的最大延迟
    #option autorate_min_bw_percent '50'   # 最低带宽百分比
    #option autorate_max_bw_percent '150'  # 最高带宽百分比
	
config fq_codel 'fq_codel'
	option target '5000'       # 5ms延迟目标
	option limit '10240'       # 队列包数量
	option quantum '1514'      # 以太网MTU
	option flows '1024'        # 流数量
	option interval '100000'   # 100ms更新间隔
	option memory_limit 'auto' # 内存限制:自动计算或者固定：16M
	option ce_threshold '0'    # 0或者1ms
	option ecn '1'             # '1' '0'

config htb 'htb'
	option priomap_enabled '1'
	option drr_quantum 'auto'
	option r2q '10'

# 上传类别定义 - 三大类 (总上传带宽: 50Mbps = 50000kbps)
config upload_class 'uclass_1'  # realtime (游戏/语音/实时视频) - 最高优先级
	option name 'realtime'
	option priority '1'
	option percent_bandwidth '15'  # 占总上传带宽的15% = 7.5Mbps
	option per_min_bandwidth '60'      # 保证带宽占类别带宽的60% = 4.5Mbps
	option per_max_bandwidth '200'      # #允许借用
	option minRTT 'No'  # 最小往返延时
	option description 'Game/VoIP'

config upload_class 'uclass_2'  # normal (普通流量: 视频/网页/应用) - 主类别
	option name 'normal'
	option priority '2'
	option percent_bandwidth '70'  # 占总上传带宽的70% = 35Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '200'     # 最大带宽占类别带宽的200% = 70Mbps
	option minRTT 'No'
	option description 'Video/Web/Application'

config upload_class 'uclass_3'  # bulk (大文件/后台流量) - 低优先级
	option name 'bulk'
	option priority '3'
	option percent_bandwidth '15'  # 占总上传带宽的15% = 7.5Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '100'     # 最大带宽占类别带宽的100% = 7.5Mbps
	option minRTT 'No'
	option description 'File/P2P'

# 下载类别定义 - 三大类 (总下载带宽: 100Mbps = 100000kbps)
config download_class 'dclass_1'  # realtime (游戏/语音/实时视频) - 最高优先级
	option name 'realtime'
	option priority '1'
	option percent_bandwidth '10'  # 占总下载带宽的10% = 10Mbps
	option per_min_bandwidth '60'  # 保证带宽占类别带宽的60% = 6Mbps
	option per_max_bandwidth '200'   #允许借用
	option minRTT 'Yes'  # 最小往返延时
	option description 'Game/VoIP'

config download_class 'dclass_2'  # normal (普通流量: 视频/网页/应用) - 主类别
	option name 'normal'
	option priority '2'
	option percent_bandwidth '70'  # 占总下载带宽的70% = 70Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '200'     # 最大带宽占类别带宽的200% = 140Mbps
	option minRTT 'No'
	option description 'Video/Web/Application'

config download_class 'dclass_3'  # bulk (大文件/后台流量) - 低优先级
	option name 'bulk'
	option priority '3'
	option percent_bandwidth '20'  # 占总下载带宽的20% = 20Mbps
	option per_min_bandwidth '0'      # 无保证带宽
	option per_max_bandwidth '100'     # 最大带宽占类别带宽的100% = 20Mbps
	option minRTT 'No'
	option description 'File/P2P'
	
# 上传规则配置
config upload_rule 'upload_rule_1'  # DNS查询 (realtime类别)
	option enabled '1'
	option class 'uclass_1'
	option order '1'
	option family 'inet'
	option dstport '53,5353'
	option connbytes_kb '<=10'
	option proto 'udp'

config upload_rule 'upload_rule_2'  # 游戏/语音 (realtime类别)
