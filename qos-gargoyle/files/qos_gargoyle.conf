# 全局配置
config global 'global'
	option enabled '0'
	option wan_interface 'pppoe-wan'
	option algorithm 'htb_cake'
	option linklayer 'atm'
	option overhead '32'
	option auto_adjust_percentages '1'
	option ruleset 'default.ru'
	option save_nft_rules '1'
	option enable_ack_limit '1'      # 启用 ACK 限速
	option udp_rate_limit_enable '1'  
    option enable_tcp_upgrade '1'
	option enable_ratelimit '0'
	option enable_dynamic_classify '1' 
	
# 上传配置
config upload 'upload'
	option total_bandwidth '50000'
	option default_class 'uclass_2'  # normal作为默认类别

# 下载配置
config download 'download'
	option default_class 'dclass_2'  # normal作为默认类别
	option total_bandwidth '100000'
	option ifb_device 'ifb0'
	
# 包含规则目录
include /etc/config/qos_gargoyle.d/*.ru
	
# 自动测速	
config speedtest 'speedtest'
    option enabled '0'               # 是否启用自动测速
    option coefficient '0.9'         # 带宽系数（0-1之间）
    option server ''                 # 可选：指定测速服务器ID
    option interface ''              # 可选：指定测速使用的网络接口（如 pppoe-wan）
	option gaming_ip '192.168.1.100'

# 动态分类：大流量	
config bulk_detect 'bulk_detect'
    option enabled '1'
    option min_bytes '10000'
    option min_connections '10'
    option class 'bulk'
	
# 动态分类：高吞度量
config htp_detect 'htp_detect'
    option enabled '1'
    option min_bytes '1000000'
    option min_connections '3'
    option class 'realtime'
	
# ACK 限速
config ack_limit 'ack_limit'
    option enabled '1' 
    option slow_rate '50'      # 低速限速阈值
    option med_rate '100'      # 中速限速阈值
    option fast_rate '500'     # 高速限速阈值
    option xfast_rate '5000'   # 超高速限速阈值
	
# TCP 升级
config tcp_upgrade 'tcp_upgrade'
    option enabled '1'                # 总开关（无其他参数）

# udp限速	
config udp_limit 'udp_limit'
    option enabled '1'                
    option rate '450'                 # 限制速率（包/秒）
    option action 'mark'              # 动作：mark 或 drop
    option mark_class 'bulk'          # 标记的目标类
	
# 算法配置	
config hfsc 'hfsc'
	option latency_mode 'dynamic'
	option minrtt_enabled '1'
	option minrtt_delay '1000us'

config cake 'cake'
	option enable_mq '1'
	option diffserv_mode 'diffserv4'
	option rtt '50ms'
	option flowmode 'srchost'          # 新增：流模式，可选 srchost/dsthost/flows/dual-srchost 等
	option overhead '0'
	option mpu '0'
	option memlimit '64Mb'
	option ack_filter '1'
	option nat '1'
	option wash '0'
	option split_gso '1'
	option ingress '0'       # 0=使用IFB, 1=使用ingress队列
	option autorate_ingress '0'
	option ecn '1'
	
	# cake-autorate（可选，由外部工具使用）
    #option autorate_enabled '1' 	 # 启用自动速率调整
    #option autorate_persist '1'      # 启用配置持久化
    #option autorate_interval '10'         # 调整间隔（秒）
    #option autorate_ping_hosts '223.5.5.5 119.29.29.29 180.76.76.76'  # 延迟测量目标
    #option autorate_min_rtt '10ms'        # 目标最小延迟
    #option autorate_max_rtt '50ms'       # 触发降速的最大延迟
    #option autorate_min_bw_percent '50'   # 最低带宽百分比
    #option autorate_max_bw_percent '150'  # 最高带宽百分比
	
config fq_codel 'fq_codel'
	option target '5000'       # 5ms延迟目标
	option limit '10240'       # 队列包数量
	option quantum '1514'      # 以太网MTU
	option flows '1024'        # 流数量
	option interval '100000'   # 100ms更新间隔
	option memory_limit 'auto' # 内存限制:自动计算或者固定：16M
	option ce_threshold '0'    # 0或者1ms
	option ecn '1'             # '1' '0'

config htb 'htb'
	option priomap_enabled '1'
	option drr_quantum 'auto'
	option r2q '10'
	
# 主动拥塞控制 (Active Congestion Control)
config qosacc 'qosacc'
	option enabled '0'
	option use_ipv6 '0'
	option ping_target ''        # 自动检测网关
	option ping_target_v6 ''     # IPv6自动检测网关
	option ping_interval '800'       # Ping间隔(100-2000ms)
	option enable_active_minrtt '1'  # 启用ACTIVE/MINRTT切换
	option skip_initial_measurement '0'  # 跳过初始测量
	option initial_ping_time '30'    # 初始ping时间(与-s一起用)
	option initial_link_limit '90000' # 初始链路限制(与-s一起用)
	option ping_limit ''             # 自定义ping限制(留空自动测量)
	option verbose '0'  
	option min_bandwidth_ratio '15'  # MIN_BW_RATIO=0.15f
	option max_bandwidth_ratio '95'  # MAX_BW_RATIO=0.95f
	option min_bw_change '50'        # MIN_BW_CHANGE_KBPS=50
	option control_interval '2000'   # CONTROL_INTERVAL_MS=2000
	
config idclass 'idclass'
    # 总开关：1 启用，0 禁用
    option enabled '1'

    # ------------------ 实时类（realtime，对应游戏/VoIP）阈值 ------------------
    # 最大平均包长（字节），超过此值则不认为是实时类
    option game_max_avg_pktlen '200'
    # 最小连接数（保留，通常可设为1）
    option game_min_conn '1'
    # 最大并发连接数，超过则不认为是实时类
    option game_max_conn '10'
    # 最大每秒包数，游戏通常低PPS
    option game_max_pps '20'
    # 需要观察的包数，达到此数量后才开始判断
    option game_sample_packets '10'

    # ------------------ 视频类（video）阈值 ------------------
    # 最小平均包长
    option video_min_avg_pktlen '800'
    # 最大平均包长（避免将超大包也视为视频）
    option video_max_avg_pktlen '1500'
    # 最小连接数
    option video_min_conn '1'
    # 最大并发连接数
    option video_max_conn '30'
    # 最小 PPS
    option video_min_pps '50'
    # 最大 PPS
    option video_max_pps '200'

    # ------------------ 大流量类（bulk，对应 P2P/下载）阈值 ------------------
    # 最小平均包长
    option bulk_min_avg_pktlen '1000'
    # 最小并发连接数（P2P 通常连接数多）
    option bulk_min_conn '20'
    # 最小 PPS
    option bulk_min_pps '100'

    # ------------------ TCP 标志分布阈值 ------------------
    # SYN/ACK 比例阈值（例如 2 表示 SYN/ACK > 2 倍可能为扫描或 P2P 控制）
    option tcp_flags_syn_ack_ratio '2'
    # 统计窗口包数，达到此值后才判断
    option tcp_flags_window '10'

    # ------------------ 连接持续时间阈值（秒） ------------------
    # 短连接阈值，低于此值可能为瞬态交互
    option conn_duration_short '5'
    # 长连接阈值，高于此值可能为持续流
    option conn_duration_long '30'

    # ------------------ 上下行流量比阈值（浮点数，自动乘以100处理） ------------------
    # 上行/下行 低于此值可能为客户端（下行为主）
    option up_down_ratio_low '0.3'
    # 上行/下行 高于此值可能为服务器（上行为主）
    option up_down_ratio_high '3.0'

    # ------------------ 突发检测阈值 ------------------
    # 突发检测时间窗口（毫秒）
    option burst_window_ms '100'
    # 窗口内最大包数阈值，超过则视为突发
    option burst_packets '10'
    # 窗口内最大字节数阈值，超过则视为突发
    option burst_bytes '10240'

    # ------------------ 包间间隔（IAT）阈值 ------------------
    # IAT 阈值（微秒），小于此值可能为游戏（小包快速）
    option iat_threshold_us '10000'        # 10ms

    # ------------------ 重传阈值 ------------------
    # 重传率百分比，超过此值则视为大流量（可能网络拥塞）
    option retrans_threshold '5'           # 5%

    # ------------------ 四类对应的 class_id（必须与 upload_class/download_class 的数字 ID 一致） ------------------
    # 实时类（对应 uclass_1 / dclass_1）
    option class_realtime '1'
    # 视频类（对应 uclass_2 / dclass_2）
    option class_video    '2'
    # 普通类（对应 uclass_3 / dclass_3）
    option class_normal   '3'
    # 大流量类（对应新增的 uclass_4 / dclass_4）
    option class_bulk     '4'

    # ------------------ 特征开关（1 启用，0 禁用） ------------------
    option enable_pktlen '1'                # 包长检测
    option enable_conn_count '1'             # 连接数检测
    option enable_pps '0'                    # PPS 检测
    option enable_iat '0'                    # 包间间隔检测
    option enable_retrans '0'                 # 重传检测
    option enable_tcp_flags '0'               # TCP 标志分布检测
    option enable_conn_duration '0'           # 连接持续时间检测
    option enable_up_down_ratio '0'           # 上下行流量比检测
    option enable_burst '0'                   # 突发大小检测'0'
	option enable_burst '0'
	
	# 权重配置
	option weight_pktlen_realtime '3'
	option weight_pktlen_video    '3'
	option weight_pktlen_normal   '1'
	option weight_pktlen_bulk     '3'
	option weight_conn_realtime   '2'
	option weight_conn_video      '1'
	option weight_conn_normal     '1'
	option weight_conn_bulk       '2'
	option weight_pps_realtime    '2'
	option weight_pps_video       '2'
	option weight_pps_normal      '1'
	option weight_pps_bulk        '2'
	option weight_burst_bulk      '3'
	option weight_tcpflags_bulk   '2'
	option weight_retrans_bulk    '2'
	option weight_duration_realtime '1'
	option weight_duration_video   '1'
	option weight_duration_bulk    '2'
	option weight_ratio_video      '1'
	option weight_ratio_realtime   '1'
	option weight_ratio_bulk       '1'
	option weight_iat_realtime     '2'

	# 最低得分阈值
	option score_threshold '3'
	
    # 优先级匹配
    option prio_realtime '0'    # realtime 逻辑分类期望优先级 0
    option prio_video    '1'    # video 期望优先级 1
    option prio_normal   '2'    # normal 期望优先级 2
    option prio_bulk     '3'    # bulk 期望优先级 3